name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Install Git LFS and Pull files
        run: |
          git lfs install
          git lfs pull

      - name: Push to hub without history
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://Luciano40:$HF_TOKEN@huggingface.co" > ~/.git-credentials
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Deploy to Hugging Face Spaces"
          git remote add space https://huggingface.co/spaces/Luciano40/pa3-ai-engine-test
          git push --force space hf-deploy:main
